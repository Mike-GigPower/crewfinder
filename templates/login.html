<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE GOAT — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --gold:#d4af37;
  --gold-dim:#8a6f1e;
  --red:#e31e24;
  --bg:#080808;
  --surface:#111;
  --border:#2a2a2a;
  --text:#f2f2f2;
  --muted:#555;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ── BACKGROUND LAYERS ── */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(212,175,55,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,175,55,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
  z-index:0;
}

.bg-vignette{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
  pointer-events:none;z-index:1;
}

/* Scan lines */
.scanlines{
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events:none;z-index:2;
  animation:scanPulse 4s ease-in-out infinite;
}
@keyframes scanPulse{
  0%,100%{opacity:.6}
  50%{opacity:.3}
}

/* Moving scan line */
.scan-line{
  position:fixed;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
  z-index:3;
  animation:scanMove 6s linear infinite;
  pointer-events:none;
}
@keyframes scanMove{
  0%{top:-2px;opacity:0}
  5%{opacity:1}
  95%{opacity:1}
  100%{top:100vh;opacity:0}
}

/* Corner brackets */
.bracket{
  position:fixed;width:40px;height:40px;
  border-color:var(--gold-dim);border-style:solid;
  opacity:.4;z-index:4;
  animation:bracketPulse 3s ease-in-out infinite;
}
.bracket.tl{top:20px;left:20px;border-width:2px 0 0 2px}
.bracket.tr{top:20px;right:20px;border-width:2px 2px 0 0}
.bracket.bl{bottom:20px;left:20px;border-width:0 0 2px 2px}
.bracket.br{bottom:20px;right:20px;border-width:0 2px 2px 0}
@keyframes bracketPulse{
  0%,100%{opacity:.4}
  50%{opacity:.7}
}

/* Status telemetry */
.telemetry{
  position:fixed;bottom:24px;left:24px;
  font-family:'Share Tech Mono',monospace;
  font-size:9px;color:var(--muted);
  line-height:1.8;z-index:5;
  opacity:.6;
}
.telem-line{
  display:flex;align-items:center;gap:8px;
}
.telem-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--gold);
  animation:telemBlink 2s ease-in-out infinite;
  flex-shrink:0;
}
.telem-dot.red{background:var(--red);animation-delay:.7s}
.telem-dot.dim{background:var(--muted);animation-name:none;opacity:.4}
@keyframes telemBlink{
  0%,100%{opacity:1}
  50%{opacity:.2}
}

.telemetry-right{
  position:fixed;bottom:24px;right:24px;
  font-family:'Share Tech Mono',monospace;
  font-size:9px;color:var(--muted);
  line-height:1.8;z-index:5;
  opacity:.5;
  text-align:right;
}

/* ── GOAT LOGO SVG ── */
.logo-wrap{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;
}

.goat-svg{
  width:100px;height:100px;
  filter:drop-shadow(0 0 20px rgba(212,175,55,0.5));
  animation:eyeGlow 3s ease-in-out infinite;
}
@keyframes eyeGlow{
  0%,100%{filter:drop-shadow(0 0 20px rgba(212,175,55,0.5))}
  50%{filter:drop-shadow(0 0 35px rgba(212,175,55,0.8)) drop-shadow(0 0 8px rgba(227,30,36,0.6))}
}

.logo-ring{
  position:absolute;
  width:120px;height:120px;
  border:1px solid rgba(212,175,55,0.2);
  border-radius:50%;
  animation:ringPulse 4s ease-in-out infinite;
}
.logo-ring-2{
  position:absolute;
  width:140px;height:140px;
  border:1px solid rgba(212,175,55,0.08);
  border-radius:50%;
  animation:ringPulse 4s ease-in-out infinite .8s;
}
@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:.6}
  50%{transform:scale(1.04);opacity:1}
}

/* ── LOGIN CARD ── */
.login-card{
  position:relative;z-index:10;
  width:380px;
  background:rgba(14,14,14,0.95);
  border:1px solid var(--border);
  border-top:1px solid rgba(212,175,55,0.4);
  padding:40px 36px;
  animation:cardReveal .8s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;
  transform:translateY(20px);
}
@keyframes cardReveal{
  to{opacity:1;transform:translateY(0)}
}

/* Gold top bar */
.login-card::before{
  content:'';
  position:absolute;top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

.login-header{
  text-align:center;
  margin-bottom:32px;
}

.login-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;
  letter-spacing:.15em;
  color:var(--gold);
  line-height:1;
  text-shadow:0 0 30px rgba(212,175,55,0.3);
}

.login-sub{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:.25em;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:4px;
}

.login-tagline{
  font-family:'Share Tech Mono',monospace;
  font-size:8px;
  letter-spacing:.15em;
  color:rgba(212,175,55,0.4);
  margin-top:8px;
  text-transform:uppercase;
}

/* Gold divider */
.gold-divider{
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
  margin:24px 0;
}

.login-welcome{
  font-family:'Rajdhani',sans-serif;
  font-size:13px;
  font-weight:600;
  color:var(--muted);
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:20px;
}

/* ── FORM FIELDS ── */
.field{
  margin-bottom:14px;
  position:relative;
}
.field label{
  display:block;
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:.2em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:6px;
}
.field input[type=text],
.field input[type=password]{
  width:100%;
  background:rgba(0,0,0,0.5);
  border:1px solid var(--border);
  border-bottom-color:rgba(212,175,55,0.2);
  color:var(--text);
  font-family:'Share Tech Mono',monospace;
  font-size:13px;
  padding:10px 12px;
  outline:none;
  transition:all .2s;
  letter-spacing:.05em;
  border-radius:2px;
}
.field input:focus{
  border-color:rgba(212,175,55,0.5);
  background:rgba(0,0,0,0.7);
  box-shadow:0 0 0 1px rgba(212,175,55,0.1), inset 0 0 20px rgba(212,175,55,0.03);
}

/* Error state */
.field.error input{
  border-color:rgba(227,30,36,0.6);
  box-shadow:0 0 0 1px rgba(227,30,36,0.1);
}

.error-msg{
  background:rgba(227,30,36,0.08);
  border:1px solid rgba(227,30,36,0.3);
  border-left:2px solid var(--red);
  padding:8px 12px;
  font-size:11px;
  color:#ff6b6b;
  font-family:'Share Tech Mono',monospace;
  margin-bottom:16px;
  letter-spacing:.03em;
}

/* Remember row */
.remember-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.remember-label{
  display:flex;align-items:center;gap:8px;
  font-family:'Rajdhani',sans-serif;
  font-size:12px;
  color:var(--muted);
  cursor:pointer;
  letter-spacing:.05em;
}
.remember-label input[type=checkbox]{
  accent-color:var(--gold);
  width:13px;height:13px;
}

/* Submit button */
.btn-signin{
  width:100%;
  background:var(--gold);
  color:#000;
  border:none;
  padding:12px;
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:.2em;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
  border-radius:2px;
}
.btn-signin::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform:translateX(-100%);
  transition:transform .4s;
}
.btn-signin:hover{
  background:#c9a227;
  box-shadow:0 0 20px rgba(212,175,55,0.4);
}
.btn-signin:hover::after{
  transform:translateX(100%);
}
.btn-signin:active{transform:scale(.99)}

/* Loading state */
.btn-signin.loading{
  background:var(--gold-dim);
  cursor:not-allowed;
}

/* Footer */
.login-footer{
  text-align:center;
  margin-top:20px;
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:rgba(85,85,85,0.6);
  letter-spacing:.1em;
}

/* Gig Power logo in footer */
.login-gp{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:12px;opacity:.4;
}
.login-gp img{height:20px;width:auto;filter:grayscale(1)}
.login-gp span{
  font-family:'Rajdhani',sans-serif;
  font-size:10px;color:var(--muted);
  letter-spacing:.15em;text-transform:uppercase;
}

</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-grid"></div>
<div class="bg-vignette"></div>
<div class="scanlines"></div>
<div class="scan-line"></div>

<!-- Corner brackets -->
<div class="bracket tl"></div>
<div class="bracket tr"></div>
<div class="bracket bl"></div>
<div class="bracket br"></div>

<!-- Telemetry -->
<div class="telemetry">
  <div class="telem-line"><div class="telem-dot"></div>SYSTEM ONLINE</div>
  <div class="telem-line"><div class="telem-dot red"></div>SMARTSTAFF LINK READY</div>
  <div class="telem-line"><div class="telem-dot dim"></div>AWAITING AUTH</div>
</div>
<div class="telemetry-right" id="telem-right">
  <div id="telem-time">--:--:--</div>
  <div id="telem-date">--- -- ----</div>
  <div style="margin-top:4px;color:rgba(212,175,55,0.3)">THE GOAT v{{ version }}</div>
</div>

<!-- Login Card -->
<div class="login-card">
  <div class="login-header">
    <!-- Full GOAT lockup graphic (emblem + wordmark + subtitle baked in) -->
    <div class="logo-wrap">
      <img src="/static/the-goat-login.png" alt="THE GOAT — Gig Power Ops, Admin, Tasking"
           style="width:210px;height:auto;object-fit:contain;
                  filter:drop-shadow(0 0 30px rgba(212,175,55,0.5));
                  animation:eyeGlow 3s ease-in-out infinite;position:relative;z-index:2">
    </div>

    <div class="login-tagline">Crew · Logistics · Intelligence</div>
  </div>

  <div class="gold-divider"></div>

  <div class="login-welcome">Welcome back</div>

  {% if error %}
  <div class="error-msg">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field{% if error %} error{% endif %}">
      <label>SmartStaff Username</label>
      <input type="text" name="username" value="{{ saved_username }}" placeholder="username" autocomplete="username" autofocus>
    </div>
    <div class="field{% if error %} error{% endif %}">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="remember-row">
      <label class="remember-label">
        <input type="checkbox" name="remember" checked>
        Remember credentials
      </label>
    </div>

    <button type="submit" class="btn-signin" id="signin-btn">SIGN IN</button>
  </form>

  <div class="login-footer">
    SECURED · GIG POWER PTY LTD
    <div class="login-gp">
      <img src="/static/logo.png" alt="Gig Power">
      <span>Gig Power</span>
    </div>
  </div>
</div>

<script>
// Live clock telemetry
function updateClock(){
  const now = new Date();
  const t = now.toTimeString().split(' ')[0];
  const d = now.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'}).toUpperCase();
  document.getElementById('telem-time').textContent = t;
  document.getElementById('telem-date').textContent = d;
}
updateClock();
setInterval(updateClock, 1000);

// Play welcome tone on sign in, then submit after a short delay
document.querySelector('form').addEventListener('submit', (e) => {
  const btn = document.getElementById('signin-btn');
  // If already in loading state, let it submit normally
  if(btn.classList.contains('loading')) return;
  e.preventDefault();
  const audio = new Audio('/static/welcome.mp3');
  audio.volume = 0.7;
  audio.play().catch(() => {});
  btn.textContent = 'AUTHENTICATING...';
  btn.classList.add('loading');
  // Submit after 1.2s — enough for the sound to land
  setTimeout(() => document.querySelector('form').submit(), 1200);
});
</script>
</body>
</html>
